# Server
server.port=8080
server.servlet.context-path=/api

# MS SQL Server Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=HospitalManagement;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=kithuni123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=HospitalManagementSecretKey2024SuperSecureBase64EncodedStringForJWT
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.com.hospital=DEBUG
logging.level.org.springframework.security=INFO
