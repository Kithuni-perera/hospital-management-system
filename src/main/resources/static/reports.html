<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reports — MediCore HMS</title>
<link rel="stylesheet" href="shared.css"/>
<style>
  .report-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .report-card { background:var(--navy2); border:1px solid var(--border); border-radius:16px; padding:28px; }
  .report-card h4 { font-family:'DM Serif Display',serif; font-size:20px; color:white; margin-bottom:20px; }
  .big-number { font-family:'DM Serif Display',serif; font-size:48px; line-height:1; }
  .sub-label { font-size:13px; color:var(--text); margin-top:6px; }
  .bar-chart { margin-top:20px; }
  .bar-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .bar-label { width:120px; font-size:13px; color:var(--text); flex-shrink:0; }
  .bar-track { flex:1; height:10px; background:var(--glass); border-radius:5px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:5px; transition:width 1s ease; }
  .bar-val { width:60px; font-size:13px; color:white; text-align:right; flex-shrink:0; }
  .revenue-filter { display:flex; gap:12px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
</style>
</head>
<body>
<div id="sidebar-container"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-title"><h1>Reports & Analytics</h1><p>Hospital performance overview</p></div>
  </div>
  <div class="content">

    <!-- Revenue Filter -->
    <div class="report-card" style="margin-bottom:24px">
      <h4>💰 Revenue Report</h4>
      <div class="revenue-filter">
        <div class="form-group" style="margin:0">
          <label>From Date</label>
          <input type="date" id="rStart" style="width:180px"/>
        </div>
        <div class="form-group" style="margin:0">
          <label>To Date</label>
          <input type="date" id="rEnd" style="width:180px"/>
        </div>
        <button class="btn btn-primary" style="margin-top:18px" onclick="fetchRevenue()">Get Revenue</button>
      </div>
      <div style="display:flex;gap:32px;align-items:flex-end">
        <div>
          <div class="sub-label">Total Revenue</div>
          <div class="big-number" id="revAmount" style="color:var(--gold)">—</div>
        </div>
      </div>
    </div>

    <div class="report-grid">
      <div class="report-card">
        <h4>📅 Appointments Breakdown</h4>
        <div class="bar-chart" id="aptChart">
          <div class="page-loading"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="report-card">
        <h4>🛏️ Bed Status</h4>
        <div class="bar-chart" id="bedChart">
          <div class="page-loading"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="report-card">
        <h4>💳 Billing Status</h4>
        <div class="bar-chart" id="billChart">
          <div class="page-loading"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="report-card">
        <h4>🏥 Hospital Summary</h4>
        <div id="summaryGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px">
          <div class="page-loading" style="grid-column:1/-1"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
requireAuth(); buildSidebar('reports.html');

// Set default date range (last 30 days)
const today = new Date();
const last30 = new Date(today - 30*24*60*60*1000);
document.getElementById('rEnd').value = today.toISOString().split('T')[0];
document.getElementById('rStart').value = last30.toISOString().split('T')[0];

function barRow(label, val, total, color) {
  const pct = total > 0 ? Math.round(val/total*100) : 0;
  return `<div class="bar-row">
    <div class="bar-label">${label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="bar-val">${val} <small style="color:var(--text)">(${pct}%)</small></div>
  </div>`;
}

async function load() {
  const res = await apiGet('/reports/dashboard');
  if (!res?.success) return;
  const d = res.data;

  // Appointments Chart
  const totalApt = d.totalAppointments || 1;
  document.getElementById('aptChart').innerHTML =
    barRow('Scheduled', d.scheduledAppointments, totalApt, 'var(--teal)') +
    barRow('Completed', d.completedAppointments, totalApt, 'var(--green)') +
    barRow('Cancelled', d.cancelledAppointments, totalApt, 'var(--red)') +
    barRow('Today', d.todayAppointments, totalApt, 'var(--gold)');

  // Bed Chart
  const totalBed = d.totalBeds || 1;
  document.getElementById('bedChart').innerHTML =
    barRow('Available', d.availableBeds, totalBed, 'var(--green)') +
    barRow('Occupied', d.occupiedBeds, totalBed, 'var(--red)') +
    barRow('Maintenance', d.maintenanceBeds, totalBed, 'var(--orange)');

  // Billing Chart
  const totalBill = (d.paidBills||0) + (d.pendingBills||0) || 1;
  document.getElementById('billChart').innerHTML =
    barRow('Paid', d.paidBills, totalBill, 'var(--green)') +
    barRow('Pending', d.pendingBills, totalBill, 'var(--gold)') +
    `<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
      <div style="color:var(--text);font-size:13px">Total Revenue</div>
      <div style="font-family:'DM Serif Display',serif;font-size:28px;color:var(--gold);margin-top:4px">${fmtCurrency(d.totalRevenue)}</div>
    </div>`;

  // Summary Grid
  document.getElementById('summaryGrid').innerHTML = [
    {label:'Total Patients', val:d.totalPatients, color:'var(--teal)', icon:'🧑‍🤝‍🧑'},
    {label:'Total Doctors', val:d.totalDoctors, color:'var(--green)', icon:'👨‍⚕️'},
    {label:'Departments', val:d.totalDepartments, color:'var(--gold)', icon:'🏢'},
    {label:'Total Beds', val:d.totalBeds, color:'var(--orange)', icon:'🛏️'},
  ].map(s=>`
    <div style="background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center">
      <div style="font-size:28px;margin-bottom:8px">${s.icon}</div>
      <div style="font-family:'DM Serif Display',serif;font-size:32px;color:${s.color}">${s.val}</div>
      <div style="font-size:12px;color:var(--text);margin-top:4px">${s.label}</div>
    </div>`).join('');
}

async function fetchRevenue() {
  const start = document.getElementById('rStart').value;
  const end = document.getElementById('rEnd').value;
  if (!start||!end) { showToast('Select date range','error'); return; }
  const res = await apiGet(`/reports/revenue?startDate=${start}&endDate=${end}`);
  if (res?.success) {
    document.getElementById('revAmount').textContent = fmtCurrency(res.data);
    showToast('Revenue fetched!');
  } else showToast('Error fetching revenue','error');
}

load();
</script>
</body>
</html>
