<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediCore HMS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #0a1628;
    --navy2: #112240;
    --teal: #00b4d8;
    --teal2: #0096c7;
    --gold: #ffd166;
    --white: #f0f4f8;
    --glass: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(0,180,216,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,209,102,0.08) 0%, transparent 50%),
                var(--navy);
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(0,180,216,0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,180,216,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .floating-cross {
    position: fixed; z-index: 0;
    opacity: 0.06;
    animation: floatAnim linear infinite;
  }
  @keyframes floatAnim {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-100vh) rotate(360deg); }
  }
  .container {
    position: relative; z-index: 1;
    display: flex;
    width: 900px;
    max-width: 95vw;
    min-height: 560px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    border: 1px solid var(--border);
  }
  .left {
    flex: 1;
    background: linear-gradient(135deg, var(--teal2) 0%, #0077b6 100%);
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .left::before {
    content: '+';
    position: absolute;
    font-size: 300px;
    font-weight: 100;
    color: rgba(255,255,255,0.08);
    right: -60px; top: -60px;
    line-height: 1;
  }
  .left-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: white;
    letter-spacing: 0.5px;
  }
  .left-content h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 38px;
    color: white;
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .left-content p {
    color: rgba(255,255,255,0.75);
    font-size: 15px;
    line-height: 1.7;
  }
  .stats-row {
    display: flex;
    gap: 24px;
  }
  .stat {
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 16px 20px;
    backdrop-filter: blur(10px);
  }
  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--gold);
  }
  .stat-label {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }
  .right {
    width: 400px;
    background: var(--navy2);
    padding: 60px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .right h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--white);
    margin-bottom: 6px;
  }
  .right p {
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    margin-bottom: 36px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.2s;
  }
  input:focus {
    border-color: var(--teal);
    background: rgba(0,180,216,0.05);
    box-shadow: 0 0 0 3px rgba(0,180,216,0.1);
  }
  input::placeholder { color: rgba(255,255,255,0.2); }
  .btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--teal), var(--teal2));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.3s;
    letter-spacing: 0.3px;
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,180,216,0.4);
  }
  .btn-login:active { transform: translateY(0); }
  .error-msg {
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff8080;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 16px;
    display: none;
  }
  .loading { opacity: 0.7; pointer-events: none; }
  @media(max-width:700px) {
    .left { display: none; }
    .right { width: 100%; padding: 40px 28px; }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>

<div class="container">
  <div class="left">
    <div class="left-logo">
      <div class="logo-icon">🏥</div>
      <span class="logo-text">MediCore HMS</span>
    </div>
    <div class="left-content">
      <h1>Complete Hospital Management</h1>
      <p>Streamline patient care, appointments, billing and staff management in one unified platform.</p>
    </div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-num">8+</div>
        <div class="stat-label">Modules</div>
      </div>
      <div class="stat">
        <div class="stat-num">24/7</div>
        <div class="stat-label">Access</div>
      </div>
      <div class="stat">
        <div class="stat-num">100%</div>
        <div class="stat-label">Secure</div>
      </div>
    </div>
  </div>
  <div class="right">
    <h2>Welcome Back</h2>
    <p>Sign in to your admin account</p>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@hospital.com" value="admin@hospital.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" value="Admin@1234"/>
    </div>
    <button class="btn-login" onclick="login()" id="loginBtn">Sign In →</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<script>
const API = '/api';

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');

  if (!email || !password) {
    showError('Please enter email and password');
    return;
  }

  btn.textContent = 'Signing in...';
  btn.classList.add('loading');
  err.style.display = 'none';

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('token', data.data.accessToken);
      localStorage.setItem('user', JSON.stringify(data.data));
      window.location.href = 'dashboard.html';
    } else {
      showError(data.message || 'Login failed');
    }
  } catch (e) {
    showError('Cannot connect to server. Make sure Spring Boot is running on port 8080.');
  } finally {
    btn.textContent = 'Sign In →';
    btn.classList.remove('loading');
  }
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg;
  err.style.display = 'block';
}

document.addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
</script>
</body>
</html>
