<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Appointments — MediCore HMS</title>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div id="sidebar-container"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-title"><h1>Appointments</h1><p>Schedule and manage appointments</p></div>
    <div class="topbar-actions">
      <button class="btn btn-primary" onclick="showAddModal()">+ Book Appointment</button>
    </div>
  </div>
  <div class="content">
    <div class="table-card">
      <div class="table-header">
        <h3>All Appointments</h3>
        <div style="display:flex;gap:10px;align-items:center">
          <select onchange="filterByStatus(this.value)" style="width:160px">
            <option value="">All Status</option>
            <option>SCHEDULED</option><option>CONFIRMED</option>
            <option>COMPLETED</option><option>CANCELLED</option><option>NO_SHOW</option>
          </select>
          <div class="search-bar"><input type="text" placeholder="Search..." oninput="filterTable(this.value)"/></div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Appt #</th><th>Patient</th><th>Doctor</th>
            <th>Date</th><th>Time</th><th>Status</th><th>Reason</th><th>Actions</th>
          </tr></thead>
          <tbody id="aptBody">
            <tr><td colspan="8"><div class="page-loading"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="aptModal">
  <div class="modal">
    <h3 id="modalTitle">Book Appointment</h3>
    <input type="hidden" id="aptId"/>
    <div class="form-grid">
      <div class="form-group full">
        <label>Patient *</label>
        <select id="aptPatient"><option value="">-- Select Patient --</option></select>
      </div>
      <div class="form-group full">
        <label>Doctor *</label>
        <select id="aptDoctor"><option value="">-- Select Doctor --</option></select>
      </div>
      <div class="form-group">
        <label>Date *</label>
        <input type="date" id="aptDate"/>
      </div>
      <div class="form-group">
        <label>Time *</label>
        <input type="time" id="aptTime"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="aptStatus">
          <option>SCHEDULED</option><option>CONFIRMED</option>
          <option>COMPLETED</option><option>CANCELLED</option><option>NO_SHOW</option>
        </select>
      </div>
      <div class="form-group">
        <label>Follow-up Date</label>
        <input type="date" id="aptFollowup"/>
      </div>
      <div class="form-group full">
        <label>Reason for Visit</label>
        <textarea id="aptReason" placeholder="Chief complaint..."></textarea>
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="aptNotes" placeholder="Additional notes..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('aptModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveApt()">Save Appointment</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
requireAuth(); buildSidebar('appointments.html');
let allApts = [], patients = [], doctors = [];

async function load() {
  const [ap, pt, dr] = await Promise.all([
    apiGet('/appointments'), apiGet('/patients'), apiGet('/admin/doctors')
  ]);
  allApts = ap?.data || [];
  patients = pt?.data || [];
  doctors = dr?.data || [];
  populateSelects();
  render(allApts);
}

function populateSelects() {
  document.getElementById('aptPatient').innerHTML = '<option value="">-- Select Patient --</option>' +
    patients.map(p=>`<option value="${p.id}">${p.firstName} ${p.lastName} (${p.patientCode})</option>`).join('');
  document.getElementById('aptDoctor').innerHTML = '<option value="">-- Select Doctor --</option>' +
    doctors.map(d=>`<option value="${d.id}">Dr. ${d.firstName} ${d.lastName} — ${d.specialization}</option>`).join('');
}

function render(data) {
  document.getElementById('aptBody').innerHTML = !data.length
    ? `<tr><td colspan="8"><div class="empty-state"><div class="icon">📅</div><h4>No Appointments</h4><p>Book the first appointment</p></div></td></tr>`
    : data.map(a=>`<tr>
      <td><span class="badge badge-gray">${a.appointmentNumber}</span></td>
      <td>${fmt(a.patientName)}</td>
      <td>Dr. ${fmt(a.doctorName)}</td>
      <td>${fmtDate(a.appointmentDate)}</td>
      <td>${fmt(a.appointmentTime)}</td>
      <td>${statusBadge(a.status)}</td>
      <td><small>${fmt(a.reason)}</small></td>
      <td><div class="action-btns">
        <button class="btn btn-outline btn-sm" onclick="editApt(${a.id})">✏️</button>
        <select class="btn btn-outline btn-sm" style="padding:6px 8px" onchange="updateStatus(${a.id},this.value)">
          <option value="">Status</option>
          <option>SCHEDULED</option><option>CONFIRMED</option>
          <option>COMPLETED</option><option>CANCELLED</option><option>NO_SHOW</option>
        </select>
        <button class="btn btn-danger btn-sm" onclick="deleteApt(${a.id},'${a.appointmentNumber}')">🗑️</button>
      </div></td>
    </tr>`).join('');
}

let statusFilter = '', searchFilter = '';
function filterByStatus(s) { statusFilter = s; applyFilters(); }
function filterTable(q) { searchFilter = q; applyFilters(); }
function applyFilters() {
  render(allApts.filter(a =>
    (!statusFilter || a.status === statusFilter) &&
    (!searchFilter || (a.patientName+a.doctorName+a.appointmentNumber).toLowerCase().includes(searchFilter.toLowerCase()))
  ));
}

function showAddModal() {
  document.getElementById('aptId').value='';
  ['aptPatient','aptDoctor','aptDate','aptTime','aptFollowup','aptReason','aptNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('aptStatus').value='SCHEDULED';
  document.getElementById('modalTitle').textContent='Book Appointment';
  openModal('aptModal');
}

function editApt(id) {
  const a = allApts.find(x=>x.id===id);
  document.getElementById('aptId').value=a.id;
  document.getElementById('aptPatient').value=a.patientId;
  document.getElementById('aptDoctor').value=a.doctorId;
  document.getElementById('aptDate').value=a.appointmentDate;
  document.getElementById('aptTime').value=a.appointmentTime;
  document.getElementById('aptStatus').value=a.status;
  document.getElementById('aptFollowup').value=a.followUpDate||'';
  document.getElementById('aptReason').value=a.reason||'';
  document.getElementById('aptNotes').value=a.notes||'';
  document.getElementById('modalTitle').textContent='Edit Appointment';
  openModal('aptModal');
}

async function saveApt() {
  const id = document.getElementById('aptId').value;
  const body = {
    patientId: +document.getElementById('aptPatient').value,
    doctorId: +document.getElementById('aptDoctor').value,
    appointmentDate: document.getElementById('aptDate').value,
    appointmentTime: document.getElementById('aptTime').value+':00',
    status: document.getElementById('aptStatus').value,
    followUpDate: document.getElementById('aptFollowup').value||null,
    reason: document.getElementById('aptReason').value||null,
    notes: document.getElementById('aptNotes').value||null
  };
  if (!body.patientId||!body.doctorId||!body.appointmentDate||!body.appointmentTime) {
    showToast('Fill required fields','error'); return;
  }
  const res = id ? await apiPut(`/appointments/${id}`,body) : await apiPost('/appointments',body);
  if (res?.success) { showToast('Appointment saved!'); closeModal('aptModal'); load(); }
  else showToast(res?.message||'Error','error');
}

async function updateStatus(id, status) {
  if (!status) return;
  const res = await apiPatch(`/appointments/${id}/status?status=${status}`);
  if (res?.success) { showToast('Status updated!'); load(); }
  else showToast('Error','error');
}

async function deleteApt(id, num) {
  confirmDelete(num, async()=>{
    const res = await apiDelete(`/appointments/${id}`);
    if (res?.success) { showToast('Deleted!'); load(); }
    else showToast(res?.message||'Error','error');
  });
}

load();
</script>
</body>
</html>
